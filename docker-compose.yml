version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: backend-postgres
    environment:
      POSTGRES_DB: backend_db
      POSTGRES_USER: backend_user
      POSTGRES_PASSWORD: backend_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend_user -d backend_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  data-loader:
    image: postgres:16-alpine
    container_name: backend-data-loader
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: backend_db
      DB_USER: backend_user
      DB_PASSWORD: backend_password
    volumes:
      - ./books:/books:ro
      - ./load-books.sh:/load-books.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - backend-network
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache jq bash
        chmod +x /load-books.sh
        echo "Waiting for app to create tables..."
        sleep 15
        /load-books.sh
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/backend_db
      SPRING_DATASOURCE_USERNAME: backend_user
      SPRING_DATASOURCE_PASSWORD: backend_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-network

volumes:
  postgres_data:

networks:
  backend-network:
    driver: bridge

